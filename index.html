<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="style.css">

</head>
    <body>
        <header id="header">
            Etch-A-Sketch
        </header>
        <div id="container">
        </div>
        <form>
            <input type="range" min="1" max="100" value="16"
                 class="mySlider" id="rangeInput"> 
                 <div id="buttons">
                     <button type="button" id="Black">
                        Black
                     </button>
                     <button type="button" id="Greyscale">
                         Greyscale
                     </button>
                    <button type="button" id="Rainbow"> 
                         Rainbow
                    </button>
                 </div>
        </form>
        <footer>
            <span class="dot"></span>
            <span class="dot" id="rightDot"></span>
        </footer>
    </body>
    
    <script src="script.js"></script>
</html>
